---
name: Release Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  # ============================================================================
  # Android APK Release Build
  # ============================================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}

      - name: Apply Custom Android Theme
        run: |
          sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y imagemagick
          python3 theme_mod.py
          convert extracted_assets/icon512.png -resize 48x48 telegram-android/TMessagesProj/src/main/res/mipmap-mdpi/ic_launcher.png
          convert extracted_assets/icon512.png -resize 72x72 telegram-android/TMessagesProj/src/main/res/mipmap-hdpi/ic_launcher.png
          convert extracted_assets/icon512.png -resize 96x96 telegram-android/TMessagesProj/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert extracted_assets/icon512.png -resize 144x144 telegram-android/TMessagesProj/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert extracted_assets/icon512.png -resize 192x192 telegram-android/TMessagesProj/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert extracted_assets/icon_round512@2x.png -resize 48x48 telegram-android/TMessagesProj/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert extracted_assets/icon_round512@2x.png -resize 72x72 telegram-android/TMessagesProj/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert extracted_assets/icon_round512@2x.png -resize 96x96 telegram-android/TMessagesProj/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert extracted_assets/icon_round512@2x.png -resize 144x144 telegram-android/TMessagesProj/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert extracted_assets/icon_round512@2x.png -resize 192x192 telegram-android/TMessagesProj/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install CMake for Android
        run: |
          sdkmanager --install "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: android-gradle-

      - name: Grant execute permission
        run: chmod +x telegram-android/gradlew

      - name: Build Debug APK
        run: |
          cd telegram-android
          ./gradlew assembleAfatDebug --stacktrace --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Build Release APK
        run: |
          cd telegram-android
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/cryptogram.keystore
            ./gradlew assembleAfatRelease \
              -Pandroid.injected.signing.store.file=/tmp/cryptogram.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.KEYSTORE_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
              --stacktrace --no-daemon
          else
            echo "No signing secrets — building unsigned release"
            ./gradlew assembleAfatRelease --stacktrace --no-daemon
          fi
        continue-on-error: true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Collect APKs
        id: collect-apk
        run: |
          mkdir -p artifacts/android
          find telegram-android/TMessagesProj*/build/outputs/apk -name "*.apk" -type f -exec cp {} artifacts/android/ \; || true
          ls -lh artifacts/android/ || true

          DEBUG_APK=$(find artifacts/android -name "*debug*.apk" | head -1)
          RELEASE_APK=$(find artifacts/android -name "*release*.apk" | head -1)
          echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-android-apks
          path: artifacts/android/
          retention-days: 30

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/android/*.apk
          draft: true
          name: CRYPTOGRAM ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Debian Linux Desktop Release Build
  # ============================================================================
  debian:
    name: Debian Linux Desktop
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential git pkg-config \
            qt6-base-dev qt6-base-private-dev qt6-tools-dev qt6-tools-dev-tools \
            qt6-image-formats-plugins qt6-l10n-tools qt6-declarative-dev qt6-multimedia-dev qt6-shadertools-dev qt6-shader-baker \
            libqt6core5compat6-dev qt6-svg-dev qt6-wayland-dev qtwayland5 \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev libswscale-dev libswresample-dev \
            libjpeg-dev libavif-dev libwebp-dev libopus-dev libvpx-dev \
            libssl-dev libopenal-dev libpulse-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-record0-dev gobject-introspection libgirepository1.0-dev \
            libxcb-screensaver0-dev libxcb-util-dev libxcb-ewmh-dev \
            libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev \
            libxcb-sync-dev libxcb-xfixes0-dev libxcb-xkb-dev libxkbcommon-x11-dev libxcb-shm0-dev \
            libxcomposite-dev libxdamage-dev libxrender-dev libxtst-dev libxss-dev libxcursor-dev \
            libasound2-dev libgbm-dev libdrm-dev libepoxy-dev libpipewire-0.3-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libfreetype6-dev libharfbuzz-dev \
            libglib2.0-dev libdbus-1-dev libx11-dev \
            libxrandr-dev libxi-dev libx11-xcb-dev libxcb-util-dev libxcb-cursor-dev libxcb-ewmh-dev \
            python3-dev python3-pip gperf \
            yasm nasm ccache ninja-build libopenh264-dev libboost-all-dev \
            cmake dh-make dpkg-dev mold liblz4-dev libxxhash-dev libminizip-dev qt6-shader-baker libqt6shadertools6-dev

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade grpcio grpcio-tools cryptography pyyaml requests sqlalchemy protobuf --break-system-packages

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-debian-${{ github.sha }}
          restore-keys: ccache-debian-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          ccache -z

      - name: Build CRYPTOGRAM Desktop
        run: |
          BUILD_TYPE=${{ github.event.inputs.build_type || 'release' }}
          export BUILD_TYPE
          export JOBS=$(nproc)
          export CCACHE_DIR=~/.ccache
          export TDESKTOP_API_ID="17349"
          export TDESKTOP_API_HASH="344583e45741c457fe1862106095a5eb"

          chmod +x build_linux.sh
          ./build_linux.sh

          ccache -s

      - name: Locate binary
        id: locate-binary
        run: |
          BINARY=""
          for candidate in \
            build_release/bin/Telegram \
            build_Release/bin/Telegram \
            build_release/Telegram \
            build_Release/Telegram \
            out/Release/Telegram \
            out/Debug/Telegram; do
            if [ -f "$candidate" ]; then
              BINARY="$candidate"
              break
            fi
          done

          if [ -z "$BINARY" ]; then
            echo "Searching for Telegram binary..."
            find . -name "Telegram" -type f -executable 2>/dev/null | head -5
            BINARY=$(find . -name "Telegram" -type f -executable 2>/dev/null | head -1)
          fi

          if [ -z "$BINARY" ]; then
            echo "::error::No Telegram binary found after desktop build"
            find . -maxdepth 4 \( -name "Telegram" -o -name "cryptogram" \) 2>/dev/null | head -10
            exit 1
          fi

          echo "binary=$BINARY" >> $GITHUB_OUTPUT
          echo "binary_found=true" >> $GITHUB_OUTPUT
          echo "Found binary: $BINARY"

      - name: Create .deb package
        if: steps.locate-binary.outputs.binary_found == 'true'
        run: |
          BINARY="${{ steps.locate-binary.outputs.binary }}"
          VERSION=$(grep -oP 'AppVersion \K\S+' Telegram/build/version || echo "1.0.0")
          ARCH=$(dpkg --print-architecture)

          mkdir -p artifacts/debian/cryptogram_${VERSION}_${ARCH}/usr/local/bin
          mkdir -p artifacts/debian/cryptogram_${VERSION}_${ARCH}/usr/local/share/applications
          mkdir -p artifacts/debian/cryptogram_${VERSION}_${ARCH}/DEBIAN

          cp "$BINARY" artifacts/debian/cryptogram_${VERSION}_${ARCH}/usr/local/bin/cryptogram
          chmod +x artifacts/debian/cryptogram_${VERSION}_${ARCH}/usr/local/bin/cryptogram

          # Create desktop entry
          cat > artifacts/debian/cryptogram_${VERSION}_${ARCH}/usr/local/share/applications/cryptogram.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=CRYPTOGRAM
          Comment=Secure Messaging Application
          Exec=/usr/local/bin/cryptogram
          Type=Application
          Categories=Network;InstantMessaging;Security;
          Terminal=false
          DESKTOP

          # Create control file
          cat > artifacts/debian/cryptogram_${VERSION}_${ARCH}/DEBIAN/control << CONTROL
          Package: cryptogram
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: CRYPTOGRAM <noreply@cryptogram.dev>
          Description: CRYPTOGRAM Secure Messaging Client
           CRYPTOGRAM is a military-grade secure messaging application
           with Signal Protocol, MLS, voice morphing, surveillance
           detection, and Tor integration.
          Depends: libqt6-core6, libqt6-gui6, libqt6-widgets6, libssl3, libopenal1, libpulse0
          Section: net
          Priority: optional
          CONTROL

          # Build .deb
          cd artifacts/debian
          dpkg-deb --build cryptogram_${VERSION}_${ARCH}
          ls -lh *.deb

      - name: Upload Debian artifact
        if: steps.locate-binary.outputs.binary_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-debian-package
          path: artifacts/debian/*.deb
          retention-days: 30

      - name: Upload .deb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.locate-binary.outputs.binary_found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/debian/*.deb
          draft: true
          name: CRYPTOGRAM ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # macOS Release Build
  # ============================================================================
  macos:
    name: macOS Release
    runs-on: macos-14
    timeout-minutes: 360
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: |
          brew install cmake ninja yasm pkg-config autoconf automake libtool
          python3 -m pip install --upgrade pip --break-system-packages
      - name: Run prepare.py to build dependencies
        run: |
          export QT=6
          python3 Telegram/build/prepare/prepare.py
      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDESKTOP_APP_USE_PACKAGED=OFF \
            -DTG_OWT_PACKAGED_BUILD=OFF \
            -DTDESKTOP_API_ID=17349 \
            -DTDESKTOP_API_HASH=344583e45741c457fe1862106095a5eb
      - name: Build Telegram
        run: |
          cmake --build build --config Release --parallel 4
      - name: Package macOS App
        run: |
          cd build/Telegram
          tar -czf cryptogram-macos.tar.gz Telegram.app
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-macos
          path: build/Telegram/cryptogram-macos.tar.gz
          retention-days: 30
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Telegram/cryptogram-macos.tar.gz
          draft: true
          name: CRYPTOGRAM ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Windows Release Build
  # ============================================================================
  windows:
    name: Windows Release
    runs-on: windows-2022
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Setup Visual Studio Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
      - name: Run prepare.py to build dependencies
        shell: cmd
        run: |
          set QT=6
          set Platform=x64
          python Telegram/build/prepare/prepare.py
      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DDESKTOP_APP_USE_PACKAGED=OFF -DTG_OWT_PACKAGED_BUILD=OFF -DTDESKTOP_API_ID=17349 -DTDESKTOP_API_HASH=344583e45741c457fe1862106095a5eb
      - name: Build Telegram
        shell: cmd
        run: |
          cmake --build build --config Release --parallel 4
      - name: Package Windows App
        shell: pwsh
        run: |
          Compress-Archive -Path build\Telegram\Telegram.exe -DestinationPath build\Telegram\cryptogram-windows.zip
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-windows
          path: build\Telegram\cryptogram-windows.zip
          retention-days: 30
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Telegram/cryptogram-windows.zip
          draft: true
          name: CRYPTOGRAM ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Build Summary
  # ============================================================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [android, debian, macos, windows]
    if: always()

    steps:
      - name: Create summary
        run: |
          echo "## CRYPTOGRAM Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status | Artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Android APK | ${{ needs.android.result }} | [cryptogram-android-apks](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Debian Package | ${{ needs.debian.result }} | [cryptogram-debian-package](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS App | ${{ needs.macos.result }} | [cryptogram-macos](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows Exe | ${{ needs.windows.result }} | [cryptogram-windows](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trigger" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
