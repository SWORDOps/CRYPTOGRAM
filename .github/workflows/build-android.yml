name: Build CRYPTOGRAM Android APK

on:
  push:
    branches:
      - claude/port-spygram-double-ratchet-*
      - main
      - master
    paths:
      - 'TMessagesProj/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'TMessagesProj/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          echo "Installing Android NDK..."
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install CMake
        run: |
          echo "Installing CMake..."
          sdkmanager --install "cmake;3.22.1"

      - name: Grant execute permission for gradlew
        run: |
          if [ -f "TMessagesProj/gradlew" ]; then
            chmod +x TMessagesProj/gradlew
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          cd TMessagesProj
          ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Build Release APK (unsigned)
        run: |
          cd TMessagesProj
          ./gradlew assembleRelease --stacktrace --no-daemon
        continue-on-error: true  # Release might fail without signing key
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Find APK files
        id: find-apk
        run: |
          echo "Finding APK files..."
          find TMessagesProj/build/outputs/apk -name "*.apk" -type f || true
          DEBUG_APK=$(find TMessagesProj/build/outputs/apk/debug -name "*.apk" -type f | head -1)
          RELEASE_APK=$(find TMessagesProj/build/outputs/apk/release -name "*.apk" -type f | head -1)
          echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: steps.find-apk.outputs.debug_apk != ''
        with:
          name: cryptogram-debug-apk
          path: ${{ steps.find-apk.outputs.debug_apk }}
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: steps.find-apk.outputs.release_apk != ''
        with:
          name: cryptogram-release-apk
          path: ${{ steps.find-apk.outputs.release_apk }}
          retention-days: 30

      - name: Upload APK to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.find-apk.outputs.debug_apk }}
            ${{ steps.find-apk.outputs.release_apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## 🔐 CRYPTOGRAM Android Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APK Files Generated" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.find-apk.outputs.debug_apk }}" ]; then
            echo "- ✅ Debug APK: \`$(basename ${{ steps.find-apk.outputs.debug_apk }})\`" >> $GITHUB_STEP_SUMMARY
            DEBUG_SIZE=$(du -h "${{ steps.find-apk.outputs.debug_apk }}" | cut -f1)
            echo "  - Size: $DEBUG_SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Debug APK: Not generated" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.find-apk.outputs.release_apk }}" ]; then
            echo "- ✅ Release APK: \`$(basename ${{ steps.find-apk.outputs.release_apk }})\`" >> $GITHUB_STEP_SUMMARY
            RELEASE_SIZE=$(du -h "${{ steps.find-apk.outputs.release_apk }}" | cut -f1)
            echo "  - Size: $RELEASE_SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ Release APK: Skipped (requires signing key)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Features Included" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Signal Protocol (Double Ratchet) for 1-on-1 chats" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ MLS Protocol (RFC 9420) for group chats" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Military-grade encryption (X25519, Ed25519, AES-256-GCM)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Settings UI with toggles" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Visual indicators (lock icons)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
