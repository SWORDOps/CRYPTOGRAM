---
name: Desktop Native Build

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LEGAL'
      - 'LICENSE'
      - 'telegram-android/**'
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LEGAL'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    name: macOS Telegram Target
    runs-on: macos-14
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja pkg-config qt@6 openssl@3 protobuf boost lz4 xxhash minizip

      - name: Configure
        run: |
          export Qt6_DIR="$(brew --prefix qt@6)/lib/cmake/Qt6"
          export OPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"
          cmake -S . -B build_macos -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6);$(brew --prefix openssl@3)" \
            -DDESKTOP_APP_DISABLE_AUTOUPDATE=ON \
            -DDESKTOP_APP_DISABLE_CRASH_REPORTS=ON \
            -DDESKTOP_APP_USE_PACKAGED=ON

      - name: Build Telegram
        run: cmake --build build_macos --target Telegram --parallel "$(sysctl -n hw.logicalcpu)"

      - name: Verify binary
        run: |
          if [ -d build_macos/bin/Telegram.app ]; then
            echo "Found build_macos/bin/Telegram.app"
            exit 0
          fi
          if [ -f build_macos/bin/Telegram ] || [ -f build_macos/Telegram ]; then
            find build_macos -maxdepth 3 \( -name Telegram -o -name Telegram.app \) -print
            exit 0
          fi
          echo "::error::No Telegram app/binary produced by macOS build"
          find build_macos -maxdepth 5 \( -name Telegram -o -name Telegram.app \) -print
          exit 1

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-macos-telegram
          path: |
            build_macos/bin/Telegram.app
            build_macos/bin/Telegram
            build_macos/Telegram
          if-no-files-found: error

  windows:
    name: Windows Telegram Target
    runs-on: windows-2022
    timeout-minutes: 150

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-declarative
            mingw-w64-ucrt-x86_64-qt6-multimedia
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-openal
            mingw-w64-ucrt-x86_64-protobuf
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-minizip
            mingw-w64-ucrt-x86_64-lz4
            mingw-w64-ucrt-x86_64-xxhash
            mingw-w64-ucrt-x86_64-qt6-shadertools

      - name: Configure
        run: |
          cmake -S . -B build_windows -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDESKTOP_APP_DISABLE_AUTOUPDATE=ON \
            -DDESKTOP_APP_DISABLE_CRASH_REPORTS=ON \
            -DDESKTOP_APP_USE_PACKAGED=ON

      - name: Build Telegram
        run: cmake --build build_windows --target Telegram --parallel "$(nproc)"

      - name: Verify binary
        run: |
          if [ -f build_windows/bin/Telegram.exe ] || [ -f build_windows/Telegram.exe ]; then
            find build_windows -maxdepth 3 -name 'Telegram.exe' -print
            exit 0
          fi
          echo "::error::No Telegram.exe produced by Windows build"
          find build_windows -maxdepth 5 -name 'Telegram.exe' -print
          exit 1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-windows-telegram
          path: |
            build_windows/bin/Telegram.exe
            build_windows/Telegram.exe
          if-no-files-found: error

  linux:
    name: Linux Telegram Target
    runs-on: ubuntu-22.04
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_SUBMODULE_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential git pkg-config \
            qt6-base-dev qt6-base-private-dev qt6-tools-dev qt6-tools-dev-tools \
            qt6-image-formats-plugins qt6-l10n-tools qt6-declarative-dev \
            qt6-multimedia-dev qt6-charts-dev \
            libssl-dev libopenal-dev libpulse-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-xkb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libfreetype6-dev libharfbuzz-dev \
            libglib2.0-dev libdbus-1-dev libx11-dev \
            libxrandr-dev libxi-dev \
            yasm nasm ccache ninja-build cmake mold liblz4-dev libxxhash-dev libminizip-dev qt6-shader-baker libqt6shadertools6-dev

      - name: Configure
        run: |
          cmake -S . -B build_linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDESKTOP_APP_DISABLE_AUTOUPDATE=ON \
            -DDESKTOP_APP_DISABLE_CRASH_REPORTS=ON \
            -DDESKTOP_APP_USE_PACKAGED=ON

      - name: Build Telegram
        run: cmake --build build_linux --target Telegram --parallel "$(nproc)"

      - name: Verify binary
        run: |
          if [ -f build_linux/bin/Telegram ] || [ -f build_linux/Telegram ]; then
            find build_linux -maxdepth 3 -name 'Telegram' -print
            exit 0
          fi
          echo "::error::No Telegram binary produced by Linux build"
          find build_linux -maxdepth 5 -name 'Telegram' -print
          exit 1

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-linux-telegram
          path: |
            build_linux/bin/Telegram
            build_linux/Telegram
          if-no-files-found: error
