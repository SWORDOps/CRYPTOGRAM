name: Docker Multi-Platform Build

on:
  push:
    branches: [ main, master, develop, claude/* ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (linux, windows, all)'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - windows
          - all

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # Build for Linux
  build-linux:
    name: Build Linux (Docker)
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.platforms == 'linux' ||
      github.event.inputs.platforms == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-linux-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-linux-

      - name: Build Linux Docker image
        run: |
          docker buildx build \
            --load \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t cryptogram-linux:latest \
            docker/linux/

      - name: Build CRYPTOGRAM for Linux
        run: |
          mkdir -p out
          docker run --rm \
            -v ${{ github.workspace }}:/build/CRYPTOGRAM:ro \
            -v ${{ github.workspace }}/out:/output \
            cryptogram-linux:latest \
            --release

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-linux-x64
          path: out/CRYPTOGRAM-linux-x64
          if-no-files-found: error

      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          if [ -d /tmp/.buildx-cache-new ]; then
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi

  # Build for Windows (cross-compile)
  build-windows:
    name: Build Windows (Cross-compile)
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.platforms == 'windows' ||
      github.event.inputs.platforms == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-windows-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-windows-

      - name: Build Windows Docker image
        run: |
          docker buildx build \
            --load \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t cryptogram-windows:latest \
            docker/windows/

      - name: Build CRYPTOGRAM for Windows
        continue-on-error: true  # Expected to fail without Qt
        run: |
          mkdir -p out
          docker run --rm \
            -v ${{ github.workspace }}:/build/CRYPTOGRAM:ro \
            -v ${{ github.workspace }}/out:/output \
            cryptogram-windows:latest \
            --release

      - name: Upload Windows binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-windows-x64
          path: out/CRYPTOGRAM-windows-x64.exe
          if-no-files-found: warn

      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          if [ -d /tmp/.buildx-cache-new ]; then
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi

  # Native Windows build (alternative to cross-compile)
  build-windows-native:
    name: Build Windows (Native)
    runs-on: windows-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.platforms == 'windows' ||
      github.event.inputs.platforms == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DTDESKTOP_API_ID=611335 `
            -DTDESKTOP_API_HASH=d524b414d21f4d37f08684c1df41ac9c

      - name: Build
        run: |
          cd build
          cmake --build . --config Release --parallel

      - name: Package
        run: |
          mkdir out
          cp build/Release/CRYPTOGRAM.exe out/ || cp build/Release/Telegram.exe out/CRYPTOGRAM.exe

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-windows-x64-native
          path: out/CRYPTOGRAM.exe
          if-no-files-found: warn

  # Create release if tagged
  create-release:
    name: Create Release
    needs: [build-linux, build-windows-native]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: cryptogram-linux-x64
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: cryptogram-windows-x64-native
          path: artifacts/
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/CRYPTOGRAM-linux-x64
            artifacts/CRYPTOGRAM.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
